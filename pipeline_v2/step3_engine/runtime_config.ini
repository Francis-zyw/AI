[paths]
; 默认读取当前项目 data 目录中的真实输出结果
step1_table_regions = data/output/step1/run-20260327-1810-newentry-full/table_regions.json
; step2_result 仅用于回退推断 synonym_library 路径；已直接指定时可置空
step2_result =
; 直接指向 Step2 产出的同义词库，不再绕行 component_matching_result.json
synonym_library = data/output/step2/run-20260330-step2/synonym_library.json
components = data/input/components.json
; Step5 审核导出的特征映射配置（可选，不存在时静默跳过）
; 由 Step5 feature_audit_tool 的"导出特征映射"按钮生成
; 放在 data/input/ 下作为跨运行的持久化配置，也可指向 step5 输出目录
feature_mapping = data/input/feature_mapping.json
output = data/output/step3/run-20260416-full

[model]
; 使用 GitHub Copilot API（env_api_key 模式）
; 需要先设置：export OPENAI_API_KEY="<copilot-token>"
model = gpt-5.4
reasoning_effort = medium
; provider_mode: codex | env_api_key
provider_mode = env_api_key
; 指向 GitHub Copilot API
api_key_env =
base_url_env =
openai_api_key =
openai_base_url = https://api.githubcopilot.com

[run]
; 默认先走本地规则，确保双击即可运行；要接模型时把 local_only 改成 false
prepare_only = false
local_only = false
max_rows_per_batch = 20
max_components_per_item = 3
