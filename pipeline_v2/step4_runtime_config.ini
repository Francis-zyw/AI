[paths]
components = data/input/components.json
synonym_library =
; 可选：knowledge-build 产出的 knowledge.db 或其所在目录
knowledge_base = /Users/zhangkaiye/AI数据/知识库中心/projects/智能提量工具
output =

[model]
model = gpt-5.4
reasoning_effort = medium
; provider_mode: codex | env_api_key
provider_mode = codex
; 如需自定义环境变量名，可在这里声明；留空时优先沿用 runtime_models.ini 或当前 shell 环境
api_key_env =
base_url_env =
; 如需显式覆盖，可直接填写；provider_mode=codex 时通常不需要设置 openai_api_key
; 不建议在配置文件中明文填写密钥；仅在临时调试且确认文件不会被提交/共享时才考虑覆盖
openai_api_key =
openai_base_url =

[run]
component_type =
prepare_only = false
local_only = false
max_items_per_batch = 20

[knowledge]
top_k = 4
max_chars = 3200
