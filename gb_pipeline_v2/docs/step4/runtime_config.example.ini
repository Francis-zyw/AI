[paths]
components = data/input/components.json
; 可留空；需要时显式指到 Step2 的 synonym_library.json
synonym_library =
; 留空则默认输出到 data/output/step4/<component_type>/
output =

[model]
; 外部使用者可替换为自己的模型
model = gpt-5.4
reasoning_effort = medium
; 建议留空并改用环境变量；这里只保留接口
openai_api_key =
openai_base_url =

[run]
; component_type 也可以直接通过 --component-type 传入
component_type =
prepare_only = false
local_only = true
max_items_per_batch = 20
