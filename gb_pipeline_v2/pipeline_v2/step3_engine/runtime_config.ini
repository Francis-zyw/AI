[paths]
; 默认读取当前项目 data 目录中的真实输出结果
step1_table_regions = data/output/step1/房屋建筑与装饰工程工程量计算标准/table_regions.json
step2_result = data/output/step2/房屋建筑与装饰工程工程量计算标准/component_matching_result.json
; 如果不想自动从 step2_result 同目录推断 synonym_library.json，可直接写死
synonym_library =
components = data/input/components.json
output = data/output/step3/房屋建筑与装饰工程工程量计算标准

[model]
; 需要改模型时，直接修改这里
model = gemini-2.5-flash
reasoning_effort = medium
; 双击运行时如需直连模型，可在这里填写；留空则继续读取系统环境变量
openai_api_key =
openai_base_url =

[run]
; 默认先走本地规则，确保双击即可运行；要接模型时把 local_only 改成 false
prepare_only = false
local_only = false
max_rows_per_batch = 20
max_components_per_item = 3
